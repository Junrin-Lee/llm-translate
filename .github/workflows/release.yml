name: Release

# Skeleton (T0.5): on a version tag, produce the Chrome and Edge zips as build
# artifacts. GitHub Release publishing and store submission are wired in T5.5.
on:
  push:
    tags: ['v*']

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Zip (chrome + edge)
        run: |
          pnpm zip
          pnpm zip:edge

      - name: Upload extension zips
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: .output/*.zip
          if-no-files-found: error
