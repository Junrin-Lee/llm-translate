name: Release

# Releasing: bump "version" in package.json (WXT derives the manifest version
# from it), commit, then push a matching tag, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
# This builds the Chrome + Edge zips and publishes them on a GitHub Release.
# Uploading to the Chrome Web Store / Edge Add-ons is done manually (see
# store-assets/ for the listing copy and permission justifications).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Zip (chrome + edge)
        run: |
          pnpm zip
          pnpm zip:edge

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
